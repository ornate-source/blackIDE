name: CI - Build - macOS

on:
  # Disabled - point to a non-existent branch to disable automatic builds
  push:
    branches:
      - 'disabled-mac-build'

env:
  APP_NAME: VSCodium
  BINARY_NAME: ${{ (github.ref == 'refs/heads/insider' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'insider')) && 'black-ide-insiders' || 'black-ide' }}
  GH_REPO_PATH: ${{ github.repository }}
  GITHUB_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.head }}
  ORG_NAME: ${{ github.repository_owner }}
  OS_NAME: osx
  VSCODE_QUALITY: ${{ (github.ref == 'refs/heads/insider' || (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'insider')) && 'insider' || 'stable' }}

permissions: {}

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    env:
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            vscode_arch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.GITHUB_BRANCH }}
          persist-credentials: false

      - name: Switch to relevant branch
        env:
          PULL_REQUEST_ID: ${{ github.event.inputs.checkout_pr }}
        run: . scripts/ci/get_pr.sh

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'

      - name: Clone VSCode repo
        run: . scripts/ci/get_repo.sh

      - name: Build
        env:
          SHOULD_BUILD: yes
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/build/build.sh

      - name: Prepare assets
        run: ./scripts/prepare/prepare_assets.sh
        if: env.SHOULD_BUILD == 'yes' && github.event.inputs.generate_assets == 'true'

      - name: Upload assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-${{ matrix.vscode_arch }}
          path: assets/
          retention-days: 3
        if: env.SHOULD_BUILD == 'yes' && github.event.inputs.generate_assets == 'true'
